{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="py-3">
        <h2 class="display-5 fw-bold text-white shadow-sm" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">
            Список завдань
        </h2>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="{% url 'tasks:task-create'%}" class="btn btn-primary rounded-pill px-4 shadow">
            <i class="bi bi-plus-lg"></i> Додати завдання
        </a>
    </div>

    <div class="card bg-white bg-opacity-75 shadow-sm border-0 p-3 mb-4 rounded-3">
        <form method="get" class="row g-3 align-items-center">
            <div class="col-auto">
                <span class="fw-bold">{{ form.status.label_tag }}</span>
            </div>
            <div class="col-auto">
                {{ form.status }}
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-info text-white px-4">Фільтрувати</button>
            </div>
        </form>
    </div>

    <div class="row g-3">
        {% for task in tasks %}
        <div class="col-12">
            <div class="card task-card border-0 shadow-sm rounded-3">
                <div class="card-body d-flex justify-content-between align-items-center p-4">
                    <div>
                        <a href="{% url 'tasks:task-detail' task.pk %}" class="h5 text-decoration-none text-dark fw-bold mb-1 d-block">
                            {{ task.title }}
                        </a>
                        <div class="d-flex gap-2">
                            <span class="badge bg-primary bg-opacity-75 rounded-pill">{{ task.status }}</span>
                            <span class="badge bg-secondary bg-opacity-75 rounded-pill">{{ task.priority }}</span>
                        </div>
                    </div>

                    <form action="{% url 'tasks:task-complete' task.pk %}" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-warning btn-sm rounded-pill px-3 fw-bold shadow-sm">
                             ✓ Виконано
                        </button>
                    </form>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <div class="card bg-white bg-opacity-50 p-4 border-0 rounded-4 text-dark">
                Завдань не знайдено.
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .task-card {
        background-color: rgba(255, 255, 255, 0.9);
        transition: all 0.3s ease;
    }

    .task-card:hover {
        transform: scale(1.02);
        background-color: #ffffff;
        box-shadow: 0 8px 15px rgba(0,0,0,0.1) !important;
    }
</style>
{% endblock %}
