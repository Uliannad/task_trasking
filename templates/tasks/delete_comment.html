{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h2 class="h5 mb-0">Підтвердження видалення</h2>
                </div>
                <div class="card-body py-4">
                    <p class="card-text fs-5">Ви впевнені, що хочете видалити цей коментар?</p>
                    <p class="text-muted small">Цю дію неможливо буде скасувати.</p>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2">
                    <form action="" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            Так, видалити
                        </button>
                    </form>
                    <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-secondary">
                        Скасувати
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
