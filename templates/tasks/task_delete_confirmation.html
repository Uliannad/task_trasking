{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="custom-glass p-5 shadow rounded-4 text-white border border-danger border-opacity-25">
            <i class="bi bi-exclamation-triangle display-1 text-warning mb-4"></i>
            <h2 class="fw-bold mb-3">Ви впевнені?</h2>
            <p class="lead mb-4 opacity-75">Ви дійсно хочете видалити завдання: <br><strong>"{{ object.title }}"</strong>?</p>

            <form method="post" class="d-flex justify-content-center gap-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg px-5 rounded-pill">Так, видалити</button>
                <a href="{% url 'tasks:task-list' %}" class="btn btn-outline-light btn-lg px-5 rounded-pill">Скасувати</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
