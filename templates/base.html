{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управління завданнями</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="{% static 'css/site.css' %}" rel="stylesheet">

    <style>

        body {
        background-image: url("{% static 'images/1.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

        .navbar-custom {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.8) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'tasks:task-list' %}">
                <i class="bi bi-check2-square me-2"></i>TaskTracker
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'tasks:task-list' %}">Головна</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2">
                    {% if user.is_authenticated %}
                        <span class="navbar-text me-3 small">
                            Привіт, <strong>{{ user.username }}</strong>
                        </span>
                        <form action="{% url 'tasks:logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                                <i class="bi bi-box-arrow-right me-1"></i> Вихід
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'tasks:login' %}" class="btn btn-sm btn-link text-decoration-none text-dark">Вхід</a>
                        <a href="{% url 'tasks:register' %}" class="btn btn-sm btn-primary rounded-pill px-4 shadow-sm">
                            Реєстрація
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
